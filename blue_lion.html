<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Blue Lion Unit Builder</title>
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
		<link rel="stylesheet" href="assets/css/style.css">
	</head>
	<body>
        <nav class="navbar navbar-expand navbar-dark bg-dark">
            <div class="container-fluid mx-5 justify-content-center">
                <div class="nav navbar-nav navbar-brand navbar-nav-scroll">
                    <a class="nav-item nav-link active" href="index.html" aria-current="page"
                        >Home <span class="visually-hidden">(current)</span></a
                    >
                    <a class="nav-item nav-link" href="#">WIP</a>
                </div>
            </div>
        </nav>
        <!-- Unit Planner -->
		<div class="app-shell">
			<aside class="character-sidebar border-end">
				<div class="sidebar-panel">
					<div class="sidebar-heading">Blue Lions</div>
					<div id="characterList" class="character-list list-group list-group-flush"></div>
				</div>
			</aside>

			<main class="app-main flex-grow-1">
				<div class="container-fluid py-4 px-3 px-lg-4">
					<header class="page-header mb-4">
						<div class="selected-character-title d-flex align-items-center gap-2 mb-1">
							<h1 id="selectedCharacterName" class="display-6 fw-semibold mb-0">Dimitri</h1>
						</div>
						<p id="selectedCharacterClass" class="text-uppercase text-secondary mb-0">Soldier</p>
						<div class="section-actions mt-3 d-flex flex-wrap gap-2">
							<button type="button" id="saveGrowthButton" class="btn btn-dark btn-sm">Export JSON</button>
							<button type="button" id="resetGrowthButton" class="btn btn-outline-dark btn-sm">Reset Growth</button>
						</div>
					</header>

					<section class="info-card card shadow-sm mb-4">
						<div class="card-body p-4 p-lg-5">
							<div class="section-title mb-3">Unit Info</div>
							<div class="row g-4 align-items-start">
								<div class="col-12 col-md-3">
									<div class="portrait-panel text-center">
										<div class="btn-group btn-group-sm portrait-toggle mb-2" role="group" aria-label="Portrait toggle">
											<button type="button" class="btn btn-outline-dark active" id="studentPortraitButton">Student</button>
											<button type="button" class="btn btn-outline-dark" id="timeSkipPortraitButton">Time Skip</button>
										</div>
										<img id="characterPortrait" class="character-portrait img-fluid" src="assets/img/misc/azure_moon.jpg" alt="Selected character portrait">
										<div class="mt-2 fw-semibold" id="characterHpLabel">28 HP</div>
									</div>
								</div>

								<div class="col-12 col-md-3">
									<div class="panel-title">Base Stat</div>
									<div id="baseStatGrid" class="stat-grid"></div>
								</div>

								<div class="col-12 col-md-3">
									<div class="panel-title">Growth Stat</div>
									<form id="growthStatForm" class="growth-form">
										<div id="growthStatGrid" class="stat-grid"></div>
										<button type="submit" class="btn btn-dark mt-3 w-100">Submit</button>
									</form>
								</div>

								<div class="col-12 col-md-3">
									<div class="panel-title">Overall Stat</div>
									<div id="overallStatGrid" class="stat-grid"></div>
								</div>
							</div>

							<div class="row g-4 mt-4">
								<div class="col-12 col-lg-6">
									<div class="compact-section-header">Abilities</div>
									<div class="combo-section">
										<div id="abilitiesSelectList" class="combo-list"></div>
										<div id="abilitiesDetails" class="combo-details">Select an ability to view effects.</div>
									</div>
								</div>

								<div class="col-12 col-lg-6">
									<div class="compact-section-header">Combat Arts</div>
									<div class="combo-section">
										<div id="combatArtsSelectList" class="combo-list"></div>
										<div id="combatArtsDetails" class="combo-details">Select a combat art to view effects.</div>
									</div>
								</div>
							</div>
						</div>
					</section>

					<section class="info-card card shadow-sm">
						<div class="card-body p-4 p-lg-5">
							<div class="section-title mb-3">Class Path</div>
							<div class="row g-4">
								<div class="col-12 col-md-4">
									<div id="classPathSelectList" class="combo-list"></div>
								</div>
								<div class="col-12 col-md-8">
									<div class="panel-title mb-2">Requirement</div>
									<div id="classPathDetails" class="combo-details">Select a class path to view requirements.</div>
								</div>
							</div>
						</div>
					</section>
				</div>
			</main>
		</div>

		<script src="assets/js/stats.js"></script>
		<script src="assets/js/character.js"></script>
		<script src="assets/js/abilities.js"></script>
		<script src="assets/js/combat_arts.js"></script>
		<script src="assets/js/classpath.js"></script>
		<script src="assets/js/app.js"></script>
	</body>
</html>
